<!DOCTYPE html>
<html ng-app="app" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1">
  <!--<base href="http://localhost/~richardhancock/github/breakerbay.github.io/">-->
  <base href="https://breakerbay.github.io/">
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
        integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css?family=Work+Sans:300,400,500,600,700" rel="stylesheet">
  <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/ng-image-gallery@2.1.3/dist/ng-image-gallery.css" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.7/angular.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.7/angular-animate.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.7/angular-sanitize.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.7/angular-messages.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/angular-ui-router/1.0.3/angular-ui-router.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/angular-ui-bootstrap/2.5.0/ui-bootstrap-tpls.js"></script>
  <script src="https://rawgit.com/hammerjs/hammer.js/v2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ng-image-gallery@2.1.3/dist/ng-image-gallery.min.js"></script>
  <script src="app.js"></script>
  <script src="components/projects/projects.js"></script>
  <title>Breaker Bay Project Galleries</title>
</head>
<body ng-controller="ProjectsCtrl" ng-init="InitPage()">
<div>
  <nav class="navbar navbar-default" role="navigation">
    <div class="navbar-header">
      <button type="button" class="navbar-toggle" ng-click="isNavCollapsed = !isNavCollapsed">
        <span class="sr-only">Toggle navigation</span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
      </button>
      <a class="navbar-brand" href="#">Projects</a>
    </div>
    <div class="collapse navbar-collapse" uib-collapse="isNavCollapsed">
      <ul class="nav navbar-nav">
        <li ng-repeat="p in projects" role="menuitem" ng-class="{ active: isActive(p.number) }"><a
          ui-sref="project({number: p.number})">{{p.name}}</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="row">
      <ui-view></ui-view>
    </div>

  </div>
</div>
</body>
</html>
